<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>W杯 観戦ナビ</title>
    <meta
      name="description"
      content="日本代表と応援する国の試合だけ、見る価値・突破条件・日本時間で整理するW杯観戦ガイド。"
    />
    <meta property="og:title" content="W杯 観戦ナビ" />
    <meta
      property="og:description"
      content="日本代表と応援する国の試合だけ、見る価値・突破条件・日本時間で整理するW杯観戦ガイド。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://semflactal-high-roas.github.io/wc-watch-os/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="W杯 観戦ナビ" />
    <meta
      name="twitter:description"
      content="日本代表と応援する国の試合だけ、見る価値・突破条件・日本時間で整理するW杯観戦ガイド。"
    />
    <style>
      .data-info-footer {
        background: #020617;
        color: #cbd5e1;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 0 1rem 6.5rem;
      }

      .data-info-footer__inner {
        border-top: 1px solid #1e293b;
        margin: 0 auto;
        max-width: 28rem;
        padding: 1rem 0 0;
      }

      .data-info-footer p {
        font-size: 0.75rem;
        line-height: 1.6;
        margin: 0.25rem 0;
      }

      .data-info-footer a {
        color: #67e8f9;
        font-weight: 700;
        text-decoration: underline;
        text-underline-offset: 0.2rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <footer class="data-info-footer" aria-label="データ情報">
      <div class="data-info-footer__inner">
        <p>
          最終更新：<span id="data-info-last-updated">読み込み中</span> / 日程ソース：<a
            id="data-info-source-link"
            href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/articles/match-schedule-fixtures-results-teams-stadiums"
            target="_blank"
            rel="noreferrer"
            >FIFA公式</a
          >
        </p>
        <p>非公式の個人制作ツールです。日程はFIFA公式情報をもとに日本時間で表示しています。</p>
        <p id="data-info-note">グループステージ日程はFIFA公式情報をもとに日本時間で表示しています。</p>
      </div>
    </footer>
    <script>
      (() => {
        const lastUpdated = document.getElementById('data-info-last-updated');
        const sourceLink = document.getElementById('data-info-source-link');
        const note = document.getElementById('data-info-note');

        fetch(new URL('data/config.json', window.location.href))
          .then((response) => (response.ok ? response.json() : null))
          .then((config) => {
            if (!config) return;
            if (lastUpdated && config.lastUpdated) lastUpdated.textContent = config.lastUpdated;
            if (sourceLink && config.scheduleSourceName) sourceLink.textContent = config.scheduleSourceName;
            if (sourceLink && config.scheduleSourceUrl) sourceLink.href = config.scheduleSourceUrl;
            if (note && config.dataNote) note.textContent = config.dataNote;
          })
          .catch(() => {
            if (lastUpdated) lastUpdated.textContent = '未確認';
          });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
